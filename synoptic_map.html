<script>
(function(){
  function initBlank(){
    var keys=Object.keys(window).filter(function(k){return k.startsWith("map_");});
    if(!keys.length){setTimeout(initBlank,200);return;}
    var MAP=window[keys[0]];
    var blankLayer=null;
    var others=[];
    MAP.eachLayer(function(l){
      if(l instanceof L.TileLayer){
        if(l.options.name==="Blank (borders only)" || (l._url&&l._url==="about:blank")){
          blankLayer=l;
        } else {
          others.push(l);
        }
      }
    });
    others.forEach(function(l){MAP.removeLayer(l);});
    if(blankLayer) blankLayer.addTo(MAP);
  }
  function tryInitBlank(){
    var keys=Object.keys(window).filter(function(k){return k.startsWith("map_");});
    if(!keys.length){setTimeout(tryInitBlank,200);return;}
    var MAP=window[keys[0]];
    MAP.on("layeradd", function(){
      MAP.eachLayer(function(l){
        if(l instanceof L.TileLayer && l._url && l._url!=="about:blank"){
          MAP.removeLayer(l);
        }
      });
    });
    initBlank();
  }
  if(document.readyState==="complete"){setTimeout(tryInitBlank,100);}
  else{window.addEventListener("load",function(){setTimeout(tryInitBlank,100);});}
})();
</script>
