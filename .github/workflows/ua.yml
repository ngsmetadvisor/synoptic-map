name: Update Synoptic Map Data
# updated 2026-03-12
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
  
on:
  schedule:
    - cron: '0 13 * * *'  # 1300Z daily
    - cron: '0 1  * * *'  # 0100Z daily
  workflow_dispatch:       # Manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - list files
        run: |
          echo "Working directory: $(pwd)"
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline
        run: python update_data.py --outdir .

      - name: Commit and push updated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add syn_ts_data.json syn_slp.json syn_ua.json syn_ua_stns.json \
                  vort_images.json conv_data.json
          git diff --cached --quiet || git commit -m "chore: update synoptic map data [$(date -u '+%Y-%m-%d %H:%MZ')]"
          git push
