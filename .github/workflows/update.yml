def main():
    print(f"=== Synoptic update: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')} ===")

    # ── METAR ─────────────────────────────────────────────────────────────
    print('\n[1/6] Loading station list...')
    STATIONS = load_stations(CSV_URL, COVERAGE)
    print(f'  {len(STATIONS)} stations loaded')

    print('[2/6] Fetching METARs...')
    raw_text, _ = fetch_all_metars(list(STATIONS.keys()), hours=12)
    metar_records = parse_all(raw_text, STATIONS)
    print(f'  {len(metar_records)} records parsed')

    # Pressure tendency
    from collections import defaultdict
    station_slp_series = defaultdict(list)
    for d in metar_records:
        if d['slp'] is not None:
            station_slp_series[d['icao']].append((d['timestamp'], d['slp']))
    for icao in station_slp_series:
        station_slp_series[icao].sort(key=lambda x: x[0])
    for d in metar_records:
        series = [(ts, slp) for ts, slp in station_slp_series[d['icao']]
                  if ts <= d['timestamp']]
        if len(series) >= 2:
            tend, change = classify_tendency_detailed(series)
            d['tendency']        = tend
            d['pressure_change'] = change

    # ── SLP grid (used globally) ──────────────────────────────────────────
    slp_grid, lon_vec, lat_vec, _, _ = build_grid(
        metar_records, 'slp', method=INTERP_METHOD, N=GRID_N,
        rbf_smoothing=RBF_SMOOTHING, sigma=SIGMA_SMOOTH)

    # ── Upper-air ──────────────────────────────────────────────────────────
    print('[3/6] Fetching upper-air soundings...')
    raw_ua    = fetch_all_ua(UPPER_AIR_STATIONS)
    ua_summary_df = build_ua_summary(raw_ua)
    print(f'  {len(ua_summary_df)} station-hour rows')
    _ua_times = ua_summary_df.groupby('hour')['valid_time'].max().reset_index()
    _ua_date_map = {str(int(r['hour'])): str(r['valid_time'])
                    for _, r in _ua_times.iterrows()}

    # ── Block 01 — ridge/trough ────────────────────────────────────────────
    print('[4/6] Computing ridge/trough...')
    rt_segs = {}
    for _hr in sorted(ua_summary_df['hour'].unique()):
        _df_hr = ua_summary_df[ua_summary_df['hour'] == _hr].copy()
        rt_segs[int(_hr)] = {}
        for lvl, key in [(850, '850'), (700, '700'), (500, '500')]:
            col = f'TEMP_{lvl}'
            rows = _df_hr.dropna(subset=[col, 'lat', 'lon'])
            if len(rows) < 8:
                rt_segs[int(_hr)][lvl] = ([], [])
                continue
            T, lv, ltv = _rbf_grid_ua(rows['lat'].values, rows['lon'].values,
                                       rows[col].values, sigma=1.5)
            if T is None:
                rt_segs[int(_hr)][lvl] = ([], [])
            else:
                rt_segs[int(_hr)][lvl] = detect_m5(T, lv, ltv)

    # ── Block 04 — per-timestamp SLP contours ─────────────────────────────
    print('[5/6] Building per-timestamp contours...')
    _ts_all = sorted(set(d['timestamp'] for d in metar_records if d['timestamp']))
    _ts_slp = {}
    for _ts in _ts_all:
        _recs = [d for d in metar_records if d['timestamp'] == _ts]
        _grid, _lv, _ltv, _, _ = build_grid(
            _recs, 'slp', method=INTERP_METHOD, N=GRID_N,
            rbf_smoothing=RBF_SMOOTHING, sigma=SIGMA_SMOOTH)
        if _grid is None:
            _ts_slp[_ts] = {'contours':[], 'hl':[], 'ttd_contours':[], 'tmp_contours':[]}
            continue
        _glon, _glat = np.meshgrid(_lv, _ltv)
        _levels = np.arange(
            np.floor(_grid.min()/SLP_INTERVAL)*SLP_INTERVAL,
            np.ceil( _grid.max()/SLP_INTERVAL)*SLP_INTERVAL + SLP_INTERVAL,
            SLP_INTERVAL)
        _fig, _ax = plt.subplots(figsize=(1,1))
        _cs = _ax.contour(_glon, _glat, _grid, levels=_levels)
        plt.close(_fig)
        _contours = []
        for _li, _lvl in enumerate(_cs.levels):
            _is_major = (int(_lvl) % 20 == 0)
            _weight   = 2.5 if _is_major else (1.4 if int(_lvl)%8==0 else 0.7)
            _opacity  = 0.95 if _is_major else (0.65 if int(_lvl)%8==0 else 0.40)
            for _coords in _cs.allsegs[_li]:
                if len(_coords) < 2: continue
                _mid = _coords[len(_coords)//2]
                _contours.append({'level': float(_lvl), 'weight': _weight,
                    'opacity': _opacity,
                    'coords': [[float(c[0]),float(c[1])] for c in _coords],
                    'label_lon': float(_mid[0]), 'label_lat': float(_mid[1])})
        _hl = find_hl_centers(_grid, _lv, _ltv,
                              neighborhood=HL_NEIGHBORHOOD, min_delta=HL_MIN_DELTA,
                              metar_records=_recs)
        # T-Td contours
        _ttd_grid, _ttd_lv, _ttd_ltv, _, _ = build_grid(
            _recs, 't_td', method='rbf', N=GRID_N,
            rbf_smoothing=TTD_RBF_SMOOTHING, sigma=TTD_SIGMA)
        _ttd_contours = []
        if _ttd_grid is not None:
            _TTD_I = 2.0
            _ttd_levels = np.arange(
                np.floor(_ttd_grid.min()/_TTD_I)*_TTD_I,
                np.ceil( _ttd_grid.max()/_TTD_I)*_TTD_I + _TTD_I, _TTD_I)
            _glon_t, _glat_t = np.meshgrid(_ttd_lv, _ttd_ltv)
            _fig_t, _ax_t = plt.subplots(figsize=(1,1))
            _cs_t = _ax_t.contour(_glon_t, _glat_t, _ttd_grid, levels=_ttd_levels)
            plt.close(_fig_t)
            for _li_t, _lvl_t in enumerate(_cs_t.levels):
                for _coords_t in _cs_t.allsegs[_li_t]:
                    if len(_coords_t) < 2: continue
                    _mid_t = _coords_t[len(_coords_t)//2]
                    _ttd_contours.append({'level': float(_lvl_t),
                        'coords': [[float(c[0]),float(c[1])] for c in _coords_t],
                        'label_lon': float(_mid_t[0]), 'label_lat': float(_mid_t[1])})
        # Temp contours
        _tmp_grid2, _tmp_lv2, _tmp_ltv2, _, _ = build_grid(
            _recs, 'temp', method='rbf', N=GRID_N,
            rbf_smoothing=TMP_RBF_SMOOTHING, sigma=TMP_SIGMA)
        _tmp_contours = []
        if _tmp_grid2 is not None:
            _TMP_I = 2.0
            _tmp_levels = np.arange(
                np.floor(_tmp_grid2.min()/_TMP_I)*_TMP_I,
                np.ceil( _tmp_grid2.max()/_TMP_I)*_TMP_I + _TMP_I, _TMP_I)
            _glon_m, _glat_m = np.meshgrid(_tmp_lv2, _tmp_ltv2)
            _fig_m, _ax_m = plt.subplots(figsize=(1,1))
            _cs_m = _ax_m.contour(_glon_m, _glat_m, _tmp_grid2, levels=_tmp_levels)
            plt.close(_fig_m)
            for _li_m, _lvl_m in enumerate(_cs_m.levels):
                for _coords_m in _cs_m.allsegs[_li_m]:
                    if len(_coords_m) < 2: continue
                    _mid_m = _coords_m[len(_coords_m)//2]
                    _tmp_contours.append({'level': float(_lvl_m),
                        'coords': [[float(c[0]),float(c[1])] for c in _coords_m],
                        'label_lon': float(_mid_m[0]), 'label_lat': float(_mid_m[1])})
        _ts_slp[_ts] = {'contours': _contours, 'hl': _hl,
                        'ttd_contours': _ttd_contours, 'tmp_contours': _tmp_contours}

    # ── Block 05 — upper-air contours ─────────────────────────────────────
    _ts_ua = {}
    UA_HL_LEVELS = [850, 700, 500]
    for _hr in sorted(ua_summary_df['hour'].unique()):
        _df_hr  = ua_summary_df[ua_summary_df['hour'] == _hr].copy()
        _hr_data = {}
        _ua_hl_all = {}
        for _plvl in UA_CONTOUR_LEVELS:
            _lvl_data = {}
            _fixed = UA_HGHT_LEVELS.get(_plvl)
            _segs  = (_build_contours_for_field(_df_hr, f'HGHT_{_plvl}',
                       _INTERVALS['HGHT'], fixed_levels=_fixed)
                      if _fixed is not None else [])
            _lvl_data['hght'] = _segs
            _segs = _build_contours_for_field(_df_hr, f'TEMP_{_plvl}', _INTERVALS['TEMP'])
            _lvl_data['temp'] = _segs
            # temp band fills
            _pts_fill = [(float(r['lat']), float(r['lon']), float(r[f'TEMP_{_plvl}']))
                         for _, r in _df_hr.iterrows()
                         if r.get(f'TEMP_{_plvl}') is not None
                         and not (isinstance(r[f'TEMP_{_plvl}'], float)
                                  and np.isnan(r[f'TEMP_{_plvl}']))]
            _band_fills = []
            if len(_pts_fill) >= 8:
                _lats_f = np.array([p[0] for p in _pts_fill])
                _lons_f = np.array([p[1] for p in _pts_fill])
                _vals_f = np.array([p[2] for p in _pts_fill])
                _lv_f   = np.linspace(_lons_f.min()-1.5, _lons_f.max()+1.5, 180)
                _ltv_f  = np.linspace(_lats_f.min()-1.5, _lats_f.max()+1.5, 180)
                try:
                    _rbf_f = RBFInterpolator(
                        np.column_stack([_lons_f, _lats_f]), _vals_f,
                        kernel='thin_plate_spline',
                        smoothing=max(0.3*len(_pts_fill), 1e-6))
                    _glon_f, _glat_f = np.meshgrid(_lv_f, _ltv_f)
                    _grid_f = _rbf_f(np.column_stack(
                        [_glon_f.ravel(), _glat_f.ravel()])).reshape(180, 180)
                    _grid_f = gaussian_filter(_grid_f, sigma=2.5)
                    _bands  = UA_TEMP_BANDS_500 if _plvl in [500,250] else UA_TEMP_BANDS_850
                    _band_fills = _build_temp_band_fills(_grid_f, _lv_f, _ltv_f, _bands, 0.0)
                except Exception:
                    pass
            _lvl_data['temp_band_fills'] = _band_fills
            # T-Td
            _df_ttd = _df_hr.copy()
            _t_col, _d_col = f'TEMP_{_plvl}', f'DWPT_{_plvl}'
            if _t_col in _df_ttd.columns and _d_col in _df_ttd.columns:
                _df_ttd[f'TTDP_{_plvl}'] = _df_ttd[_t_col] - _df_ttd[_d_col]
                _segs = _build_contours_for_field(_df_ttd, f'TTDP_{_plvl}', _INTERVALS['TTDP'])
            else:
                _segs = []
            _lvl_data['ttdp'] = _segs
            _segs = _build_contours_for_field(_df_hr, f'SPED_{_plvl}', _INTERVALS['SPED'])
            _lvl_data['sped'] = _segs
            _hr_data[str(_plvl)] = _lvl_data

        # instability
        _instab_cts = []
        _stn_lats, _stn_lons, _stn_vals = [], [], []
        for _, _row in _df_hr.iterrows():
            _v5 = _row.get('TEMP_500'); _v7 = _row.get('TEMP_700')
            if (_v5 is None or _v7 is None
                    or (isinstance(_v5, float) and np.isnan(_v5))
                    or (isinstance(_v7, float) and np.isnan(_v7))): continue
            _stn_lats.append(float(_row['lat']))
            _stn_lons.append(float(_row['lon']))
            _stn_vals.append(float(_v7) - float(_v5))
        if _stn_vals:
            _stn_lats = np.array(_stn_lats)
            _stn_lons = np.array(_stn_lons)
            _stn_vals = np.array(_stn_vals)
            _NI = 180; _pad = 1.5
            _ilon = np.linspace(_stn_lons.min()-_pad, _stn_lons.max()+_pad, _NI)
            _ilat = np.linspace(_stn_lats.min()-_pad, _stn_lats.max()+_pad, _NI)
            _iglon, _iglat = np.meshgrid(_ilon, _ilat)
            _tree = cKDTree(np.column_stack([_stn_lons, _stn_lats]))
            _dists, _idxs = _tree.query(
                np.column_stack([_iglon.ravel(), _iglat.ravel()]), k=1)
            _nn = _stn_vals[_idxs].astype(float)
            _nn[_dists > 3.5] = np.nan
            _diff_grid = _nn.reshape(_NI, _NI)
            _diff_sm   = gaussian_filter(
                np.where(np.isnan(_diff_grid), 0, _diff_grid), sigma=sigmaT700500)
            _diff_sm[np.isnan(_diff_grid)] = np.nan
            for _band_lvl in [16, 18]:
                _binary = np.where(
                    (~np.isnan(_diff_sm)) & (_diff_sm >= _band_lvl) &
                    (_diff_sm < (_band_lvl+2) if _band_lvl==16
                     else np.ones_like(_diff_sm, bool)),
                    1.0, 0.0)
                if _binary.max() < 0.5: continue
                _fig_i, _ax_i = plt.subplots(figsize=(1,1))
                try:
                    _cs_i = _ax_i.contour(_iglon, _iglat, _binary, levels=[0.5])
                    for _seg in _cs_i.allsegs[0]:
                        if len(_seg) < 3: continue
                        _mid_i = _seg[len(_seg)//2]
                        _instab_cts.append({'level': float(_band_lvl),
                            'coords': [[float(p[0]),float(p[1])] for p in _seg],
                            'label_lon': float(_mid_i[0]), 'label_lat': float(_mid_i[1])})
                except Exception: pass
                plt.close(_fig_i)

        # UA H/L
        for _plvl in UA_HL_LEVELS:
            _pts = [(float(r['lat']), float(r['lon']), float(r[f'HGHT_{_plvl}']))
                    for _, r in _df_hr.iterrows()
                    if r.get(f'HGHT_{_plvl}') is not None
                    and not (isinstance(r[f'HGHT_{_plvl}'], float)
                             and np.isnan(r[f'HGHT_{_plvl}']))]
            if len(_pts) < 8:
                _ua_hl_all[_plvl] = []
                continue
            _seen = {}
            for _la, _lo, _v in _pts:
                _seen.setdefault((round(_la,2), round(_lo,2)), []).append(_v)
            _pts   = [(_k[0],_k[1],float(np.mean(_vs))) for _k,_vs in _seen.items()]
            _la_u  = np.array([p[0] for p in _pts])
            _lo_u  = np.array([p[1] for p in _pts])
            _va_u  = np.array([p[2] for p in _pts])
            _lv_u  = np.linspace(_lo_u.min()-1.5, _lo_u.max()+1.5, 180)
            _ltv_u = np.linspace(_la_u.min()-1.5, _la_u.max()+1.5, 180)
            _glon_u, _glat_u = np.meshgrid(_lv_u, _ltv_u)
            try:
                _rbf_u = RBFInterpolator(
                    np.column_stack([_lo_u, _la_u]), _va_u,
                    kernel='thin_plate_spline',
                    smoothing=max(0.3*len(_pts), 1e-6))
                _hght_grid = _rbf_u(np.column_stack(
                    [_glon_u.ravel(), _glat_u.ravel()])).reshape(180, 180)
            except Exception:
                _ua_hl_all[_plvl] = []
                continue
            _hght_grid = gaussian_filter(_hght_grid, sigma=2.5)
            sg    = gaussian_filter(_hght_grid, sigma=HL_SIGMA)
            max_f = maximum_filter(sg, size=HL_NEIGHBORHOOD)
            min_f = minimum_filter(sg, size=HL_NEIGHBORHOOD)
            is_max = (sg == max_f) & (sg - min_f > 1.0)
            is_min = (sg == min_f) & (max_f - sg > 1.0)
            _ua_hl = []
            for _typ, _mask in [('H', is_max), ('L', is_min)]:
                _lbl2, _n = label(_mask)
                for _i in range(1, _n+1):
                    _rows, _cols = np.where(_lbl2 == _i)
                    _best = (np.argmax(sg[_rows,_cols]) if _typ=='H'
                             else np.argmin(sg[_rows,_cols]))
                    _r, _c = _rows[_best], _cols[_best]
                    if _r < HL_NEIGHBORHOOD or _r > 180-HL_NEIGHBORHOOD: continue
                    if _c < HL_NEIGHBORHOOD or _c > 180-HL_NEIGHBORHOOD: continue
                    _ua_hl.append(dict(type=_typ,
                                       lat=float(_ltv_u[_r]),
                                       lon=float(_lv_u[_c]),
                                       val=float(_hght_grid[_r,_c])))
            _ua_hl_all[_plvl] = _ua_hl

        def _seg_to_dict(seg):
            mid = seg[len(seg)//2]
            return {'coords': [[float(p[1]),float(p[0])] for p in seg],
                    'label_lon': float(mid[1]), 'label_lat': float(mid[0])}

        _hr_int = int(_hr)
        _rt     = rt_segs.get(_hr_int, {})
        _ts_ua[str(_hr_int)] = {
            'levels':             _hr_data,
            'instab':             _instab_cts,
            'thermal_ridge_850':  [_seg_to_dict(s) for s in _rt.get(850, ([], []))[0]],
            'thermal_trough_850': [_seg_to_dict(s) for s in _rt.get(850, ([], []))[1]],
            'thermal_ridge_700':  [_seg_to_dict(s) for s in _rt.get(700, ([], []))[0]],
            'thermal_trough_700': [_seg_to_dict(s) for s in _rt.get(700, ([], []))[1]],
            'thermal_ridge_500':  [_seg_to_dict(s) for s in _rt.get(500, ([], []))[0]],
            'thermal_trough_500': [_seg_to_dict(s) for s in _rt.get(500, ([], []))[1]],
            'dtdx_zero_pts':      [],
            **{f'hl_{pl}': _ua_hl_all.get(pl, []) for pl in UA_HL_LEVELS},
        }

    # ── Block 06 — convergence ────────────────────────────────────────────
    print('[6/6] Computing convergence zones...')
    _conv_sfc_by_ts  = {}
    _conv_850_by_hr  = {}
    _sfc_trough_by_ts = {}

    for _ts in _ts_all:
        _recs = [d for d in metar_records if d['timestamp'] == _ts]
        pts_u, pts_v = [], []
        for d in _recs:
            _wd = d.get('wind_dir'); _ws = d.get('wind_spd')
            if _wd is None or _ws is None: continue
            try: _wd, _ws = float(_wd), float(_ws)
            except (TypeError, ValueError): continue
            if not (0 <= _wd <= 360) or not (0 <= _ws <= 100): continue
            _ws_ms = _ws * 0.514444 if _ws > 5 else _ws
            _u, _v = _drct_sped_to_uv(_wd, _ws_ms)
            pts_u.append((d['lat'], d['lon'], _u))
            pts_v.append((d['lat'], d['lon'], _v))
        u_g, v_g, lv, ltv = build_wind_grids(pts_u, pts_v)
        if u_g is None:
            _conv_sfc_by_ts[_ts] = []
        else:
            div_g = compute_divergence_grid(u_g, v_g, lv, ltv)
            _conv_sfc_by_ts[_ts] = extract_convergence_contours(div_g, lv, ltv)

        # SFC trough from SLP
        _slp_g, _slp_lv, _slp_ltv = None, None, None
        _pts_t = [(d['lat'], d['lon'], d['slp']) for d in _recs if d.get('slp') is not None]
        if len(_pts_t) >= 8:
            _seen_t = {}
            for _la, _lo, _v in _pts_t:
                _seen_t.setdefault((round(_la,2),round(_lo,2)), []).append(_v)
            _pts_t = [(_k[0],_k[1],float(np.mean(_vs))) for _k,_vs in _seen_t.items()]
            _la_t  = np.array([p[0] for p in _pts_t])
            _lo_t  = np.array([p[1] for p in _pts_t])
            _va_t  = np.array([p[2] for p in _pts_t])
            _lv_t  = np.linspace(_lo_t.min()-1.5, _lo_t.max()+1.5, 150)
            _ltv_t = np.linspace(_la_t.min()-1.5, _la_t.max()+1.5, 150)
            _GL_t, _GLA_t = np.meshgrid(_lv_t, _ltv_t)
            try:
                _rbf_t = RBFInterpolator(np.column_stack([_lo_t, _la_t]), _va_t,
                                         kernel='thin_plate_spline',
                                         smoothing=max(0.3*len(_pts_t), 1e-6))
                _slp_g = gaussian_filter(
                    _rbf_t(np.column_stack([_GL_t.ravel(),_GLA_t.ravel()])
                           ).reshape(150,150), sigma=3.0)
                _slp_lv, _slp_ltv = _lv_t, _ltv_t
            except Exception:
                pass
        _trough_pts = []
        if _slp_g is not None:
            _Ts = gaussian_filter(_slp_g, sigma=2.0)
            for _j, _lat in enumerate(_slp_ltv):
                _tr, _tpr = find_peaks(-_Ts[_j,:], prominence=0.3, width=2)
                if len(_tr):
                    _top = np.argsort(_tpr['prominences'])[-4:]
                    for _idx in _tr[_top]:
                        _prom = _tpr['prominences'][np.where(_tr==_idx)[0][0]]
                        _trough_pts.append((_lat, _slp_lv[_idx], float(_prom)))
        _segs_t = _pts_to_segs(_trough_pts, max_dist=4.0, min_pts=4)
        _sfc_trough_by_ts[_ts] = []
        for _seg in _segs_t:
            _mid = _seg[len(_seg)//2]
            _sfc_trough_by_ts[_ts].append({
                'coords': [[p[1],p[0]] for p in _seg],
                'label_lat': _mid[0], 'label_lon': _mid[1]})

    for _hr in sorted(ua_summary_df['hour'].unique()):
        _df = ua_summary_df[ua_summary_df['hour'] == _hr].copy()
        pts_u, pts_v = [], []
        for _, row in _df.iterrows():
            _wd = row.get('DRCT_850'); _ws = row.get('SPED_850')
            if _wd is None or _ws is None: continue
            if isinstance(_wd, float) and np.isnan(_wd): continue
            if isinstance(_ws, float) and np.isnan(_ws): continue
            _u, _v = _drct_sped_to_uv(float(_wd), float(_ws))
            pts_u.append((float(row['lat']), float(row['lon']), _u))
            pts_v.append((float(row['lat']), float(row['lon']), _v))
        u_g, v_g, lv, ltv = build_wind_grids(pts_u, pts_v)
        if u_g is None:
            _conv_850_by_hr[str(int(_hr))] = []
        else:
            div_g = compute_divergence_grid(u_g, v_g, lv, ltv)
            _conv_850_by_hr[str(int(_hr))] = extract_convergence_contours(div_g, lv, ltv)

    # ── Build per-timestamp station data (for syn_ts_data.json) ──────────
    _ts_data = {}
    for _ts in _ts_all:
        _entries = []
        for d in metar_records:
            if d['timestamp'] != _ts: continue
            _fc = {'VFR':'green','MVFR':'steelblue','IFR':'crimson','LIFR':'red'}.get(d['flt_cat'],'#888')
            _wg = f' G{d["wind_gust"]}' if d.get('wind_gust') else ''
            _pop = (f'<b>{d["icao"]}</b> {d["flt_cat"]}<br>'
                    f'Temp/Dew: {d["temp"]}C / {d["dew"]}C<br>'
                    f'Wind: {d["wind_dir"]}/{d["wind_spd"]}kt{_wg}<br>'
                    f'SLP: {d["slp"]} hPa')
            _entries.append({
                'lat': d['lat'], 'lon': d['lon'],
                'popup': _pop,
                'tip': f'{d["icao"]} {d["temp"]}C/{d["dew"]}C {d["wind_dir"]}/{d["wind_spd"]}kt',
                'svg': '', 'svg_w': 60, 'svg_h': 60
            })
        _ts_data[_ts] = _entries

    # ── Write JSON files ──────────────────────────────────────────────────
    files = {
        'syn_ts_data.json':  _ts_data,
        'syn_slp.json':      _ts_slp,
        'syn_ua.json':       _ts_ua,
        'syn_ua_stns.json':  {},           # station SVGs need notebook render — leave empty
        'conv_data.json':    {
            'sfc':        _conv_sfc_by_ts,
            '850':        _conv_850_by_hr,
            'sfc_trough': _sfc_trough_by_ts,
            'threshold':  CONV_THRESHOLD,
        },
    }
    for fname, data in files.items():
        with open(fname, 'w') as f:
            json.dump(data, f)
        print(f'  ✓ {fname} ({os.path.getsize(fname)//1024} KB)')

    print('\n✅ Update complete.')


if __name__ == '__main__':
    import os
    main()
