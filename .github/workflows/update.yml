#  UPPER-AIR FETCH
# ══════════════════════════════════════════════════════════════════════════
def get_sounding_dt(hour, lookback_days=0):
    now = datetime.now(timezone.utc)
    dt  = now.replace(hour=hour, minute=0, second=0, microsecond=0)
    if dt > now:
        dt -= timedelta(days=1)
    return dt - timedelta(days=lookback_days)


def fetch_raw_ua(stn, hour, lookback=0):
    dt     = get_sounding_dt(hour, lookback)
    dt_str = f'{dt.strftime("%Y-%m-%d")} {hour}:00:00'
    url    = (f'{WYOMING_BASE}?datetime={quote(dt_str)}'
              f'&id={stn["wmo"]}&src=BUFR&type=TEXT:LIST')
    try:
        r = requests.get(url, timeout=UA_TIMEOUT)
        if not r.ok or len(r.text) < 300:
            return None
        txt = r.text
        if any(x in txt for x in ("Can't get", "No Observation", "ERROR")):
            return None
        return txt
    except Exception:
        return None


def parse_sounding(html, stn, hour, lookback=0):
    dt = get_sounding_dt(hour, lookback)
    obs_lat = obs_lon = obs_name = None
    lat_m = re.search(r'Latitude:\s*([-\d.]+)',  html, re.I)
    lon_m = re.search(r'Longitude:\s*([-\d.]+)', html, re.I)
    if lat_m: obs_lat = float(lat_m.group(1))
    if lon_m: obs_lon = float(lon_m.group(1))
    h2 = re.search(r'<h2[^>]*>([\s\S]*?)</h2>', html, re.I)
    if h2:
        txt   = re.sub(r'<[^>]+>', ' ', h2.group(1))
        lines = [l.strip() for l in txt.split('\n') if l.strip()]
        if len(lines) >= 2:
            obs_name = lines[-1]
    pre = re.search(r'<pre>([\s\S]*?)</pre>', html, re.I)
    if not pre:
        return []
    rows = []
    for line in pre.group(1).split('\n'):
        cols = line.strip().split()
        if len(cols) < 7: continue
        try:
            pres = float(cols[0])
        except ValueError:
            continue
        if not (100 <= pres <= 1100): continue
        def fv(i):
            try:
                v = float(cols[i])
                return None if abs(v) > 9000 else v
            except (IndexError, ValueError):
                return None
        rows.append({
            'icao': stn['id'], 'wmo': stn['wmo'],
            'stn_name': obs_name or stn['name'],
            'lat': obs_lat or stn['lat'], 'lon': obs_lon or stn['lon'],
            'valid_time': dt.strftime('%Y-%m-%d') + f' {hour:02d}Z',
            'hour': hour, 'PRES': pres,
            'HGHT': fv(1), 'TEMP': fv(2), 'DWPT': fv(3),
            'RELH': fv(4), 'MIXR': fv(5), 'DRCT': fv(6), 'SPED': fv(7),
            'THTA': fv(8) if len(cols) > 8  else None,
            'THTE': fv(9) if len(cols) > 9  else None,
            'THTV': fv(10) if len(cols) > 10 else None,
        })
    return rows


def fetch_all_ua(stations, hours=UA_HOURS, workers=UA_WORKERS):
    tasks    = [(s, h) for s in stations for h in hours]
    all_rows = []
    failed   = []
    with concurrent.futures.ThreadPoolExecutor(max_workers=workers) as ex:
        fmap = {ex.submit(fetch_raw_ua, s, h): (s, h) for s, h in tasks}
        for fut in concurrent.futures.as_completed(fmap):
            s, h = fmap[fut]
            html = fut.result()
            if html:
                rows = parse_sounding(html, s, h)
                if rows:
                    all_rows.extend(rows)
                    continue
            failed.append((s, h))
    if failed:
        retry  = failed[:]
        failed = []
        with concurrent.futures.ThreadPoolExecutor(max_workers=workers) as ex:
            fmap2 = {ex.submit(fetch_raw_ua, s, h, 1): (s, h) for s, h in retry}
            for fut in concurrent.futures.as_completed(fmap2):
                s, h = fmap2[fut]
                html = fut.result()
                if html:
                    rows = parse_sounding(html, s, h, lookback=1)
                    if rows:
                        all_rows.extend(rows)
                        continue
                failed.append((s, h))
    return all_rows


def build_ua_summary(raw_rows):
    FIELDS = ['PRES','HGHT','TEMP','DWPT','RELH','MIXR','DRCT','SPED','THTA','THTE','THTV']
    ua_raw_df = pd.DataFrame(raw_rows)
    _latest   = ua_raw_df.groupby('hour')['valid_time'].max()
    mask      = ua_raw_df['valid_time'] == ua_raw_df['hour'].map(_latest)
    ua_raw_df = ua_raw_df[mask].reset_index(drop=True)

    summary_rows = []
    for (icao, hour), grp in ua_raw_df.groupby(['icao','hour'], sort=False):
        grp  = grp.sort_values('PRES', ascending=False).reset_index(drop=True)
        meta = grp.iloc[0]
        base = {
            'icao': icao, 'wmo': meta['wmo'], 'stn_name': meta['stn_name'],
            'lat': meta['lat'], 'lon': meta['lon'],
            'valid_time': meta['valid_time'], 'hour': hour,
        }
        for lvl in STANDARD_LEVELS:
            sub = grp.copy()
            sub['_dist'] = (sub['PRES'] - lvl).abs()
            sub = sub[sub['_dist'] <= LEVEL_TOL]
            if sub.empty:
                for f in FIELDS: base[f'{f}_{lvl}'] = None
            else:
                best = sub.loc[sub['_dist'].idxmin()]
                for f in FIELDS:
                    base[f'{f}_{lvl}'] = best[f] if not pd.isna(best[f]) else None
        summary_rows.append(base)
    return pd.DataFrame(summary_rows).sort_values(['icao','hour']).reset_index(drop=True)


